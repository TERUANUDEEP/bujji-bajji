<body class="bg-transparent text-white">

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      protectPage();
      loadHistory();
    });
    function showToast(

  message,

  type = "success"

) {

  const toast =

    document.getElementById(
      "toast"
    );

  toast.innerText =
    message;

  toast.className =

    `fixed top-5 right-5 z-50 rounded-2xl px-6 py-4 text-white font-bold shadow-2xl

    ${

      type === "success"

      ?

      "bg-green-500"

      :

      "bg-red-500"

    }`;

  toast.classList.remove(
    "hidden"
  );

  setTimeout(() => {

    toast.classList.add(
      "hidden"
    );

  }, 2500);

}
  </script>
<div

id="toast"

class="fixed top-5 right-5 z-50 hidden rounded-2xl bg-green-500 px-6 py-4 text-white font-bold shadow-2xl">

</div>
<audio
id="globalMusic"
loop>

<source
src="default-music.mp3"
type="audio/mpeg">
