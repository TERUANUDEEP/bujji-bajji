<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

<title>Saved Addresses</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-6">
<button
onclick="window.location.href='index.html'"
class="mb-6 bg-orange-500 hover:bg-orange-600 px-5 py-3 rounded-xl font-bold text-white shadow-lg">

← Back To Profile

</button>
<h1 class="text-4xl font-bold mb-6">
📍 Saved Addresses
</h1>

<div id="addressContainer"
class="space-y-4">
</div>

<button
id="addAddressBtn"
class="
mt-6
w-full
bg-green-500
hover:bg-green-600
p-4
rounded-2xl
font-bold">

➕ Add New Address

</button>
<!-- ADD ADDRESS MODAL -->

<div
id="addAddressModal"
class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">

<div
class="bg-slate-900 rounded-3xl p-6 w-[95%] max-w-lg">

<h2 class="text-2xl font-bold mb-5 text-orange-400">
➕ Add New Address
</h2>

<label
for="newAddressLabel"
class="block mb-2 font-semibold">

Address Type

</label>

<select
id="newAddressLabel"
title="Address Type"
class="w-full p-3 rounded-xl text-black mb-3">

<option value="Home">🏠 Home</option>
<option value="Office">🏢 Office</option>
<option value="Hostel">🏫 Hostel</option>

</select>

<input
id="newFullName"
placeholder="Full Name"
class="w-full p-3 rounded-xl text-black mb-3">

<input
id="newPhone"
placeholder="Phone Number"
class="w-full p-3 rounded-xl text-black mb-3">

<input
id="newHouse"
placeholder="House / Flat No"
class="w-full p-3 rounded-xl text-black mb-3">

<input
id="newStreet"
placeholder="Street"
class="w-full p-3 rounded-xl text-black mb-3">

<input
id="newCity"
placeholder="City"
class="w-full p-3 rounded-xl text-black mb-3">

<input
id="newPincode"
placeholder="Pincode"
class="w-full p-3 rounded-xl text-black mb-4">

<div class="flex gap-3">

<button
id="saveAddressBtn"
class="flex-1 bg-green-500 p-3 rounded-xl font-bold">

💾 Save

</button>

<button
onclick="closeAddressModal()"
class="flex-1 bg-red-500 p-3 rounded-xl font-bold">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- EDIT ADDRESS MODAL -->

<div
id="editAddressModal"
class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">

<div
class="bg-slate-900 rounded-3xl p-6 w-[95%] max-w-lg border border-blue-500/30">

<h2
class="text-2xl font-bold text-blue-400 mb-5">

✏ Edit Address

</h2>

<div class="space-y-3">

<input
id="editFullName"
placeholder="Full Name"
class="w-full p-3 rounded-xl text-black">

<input
id="editPhone"
placeholder="Phone Number"
class="w-full p-3 rounded-xl text-black">

<input
id="editHouse"
placeholder="House / Flat"
class="w-full p-3 rounded-xl text-black">

<input
id="editStreet"
placeholder="Street"
class="w-full p-3 rounded-xl text-black">

<input
id="editCity"
placeholder="City"
class="w-full p-3 rounded-xl text-black">

<input
id="editPincode"
placeholder="Pincode"
class="w-full p-3 rounded-xl text-black">

</div>

<div class="flex gap-3 mt-5">

<button
id="saveEditedAddressBtn"
class="flex-1 bg-green-500 hover:bg-green-600 p-3 rounded-xl font-bold">

Save Changes

</button>

<button
onclick="closeEditAddressModal()"
class="flex-1 bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-bold">

Cancel

</button>

</div>

</div>

</div>


<!-- DELETE ADDRESS MODAL -->

<div
id="deleteAddressModal"
class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">

<div
class="bg-slate-900 border border-red-500/30 rounded-3xl p-8 w-[90%] max-w-md">

<h2
class="text-2xl font-bold text-red-400 mb-4">

🗑 Delete Address

</h2>

<p class="text-slate-300 mb-6">

Are you sure you want to delete this address?

</p>

<div class="flex gap-3">

<button
id="confirmDeleteAddressBtn"
class="flex-1 bg-red-500 hover:bg-red-600 p-3 rounded-xl font-bold">

Delete

</button>

<button
onclick="closeDeleteAddressModal()"
class="flex-1 bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-bold">

Cancel

</button>

</div>

</div>

</div>




<script src="script.js"></script>

<script>


let selectedAddressLabel = "";

let editingAddressLabel = "";


async function loadAddresses(){

  let email =
    localStorage.getItem(
      "userEmail"
    );

  let res =
    await fetch(
  `https://bujji-bajji-production.up.railway.app/addresses/${email}`
);

  let addresses =
    await res.json();

  document.getElementById(
    "addressContainer"
  ).innerHTML =

addresses.map(a => `

<div
class="
bg-slate-800/80
backdrop-blur-xl
border border-white/10
rounded-3xl
p-6
shadow-xl">

<div
class="
flex
justify-between
items-center
mb-4">

<div>

<h2
class="
text-2xl
font-bold
text-orange-400">

${a.label === "Home"
? "🏠 Home"
: a.label === "Office"
? "🏢 Office"
: "🏫 Hostel"}

</h2>

${
a.isDefault
? `
<span
class="
text-green-400
text-sm
font-semibold">

⭐ Default Address

</span>
`
: ""
}

</div>

</div>

<div class="space-y-1">

<p class="font-bold">
${a.fullName}
</p>

<p>
📞 ${a.phone}
</p>

<p>
${a.house}
</p>

<p>
${a.street}
</p>

<p>
${a.city}
-
${a.pincode}
</p>

</div>

<div
class="
flex
gap-3
mt-5
flex-wrap">

${
!a.isDefault
?
`
<button
class="
make-default-btn
bg-green-500
px-4
py-2
rounded-xl"
data-label="${a.label}">

⭐ Make Default

</button>
`
:
`
<button
class="
bg-green-700
px-4
py-2
rounded-xl
cursor-default">

⭐ Default

</button>
`
}

<button
onclick="openEditAddressModal('${a.label}')"
class="
bg-blue-500
px-4
py-2
rounded-xl">

✏ Edit

</button>

<button
onclick="openDeleteAddressModal('${a.label}')"
class="
bg-red-500
px-4
py-2
rounded-xl">

🗑 Delete

</button>

</div>

</div>

`).join("");

}
document
.getElementById(
  "addAddressBtn"
)
.addEventListener(
  "click",
  () => {

    document
    .getElementById(
      "addAddressModal"
    )
    .classList
    .remove(
      "hidden"
    );

    document
    .getElementById(
      "addAddressModal"
    )
    .classList
    .add(
      "flex"
    );

  }
);

function openDeleteAddressModal(label){

selectedAddressLabel = label;

document
.getElementById(
"deleteAddressModal"
)
.classList.remove(
"hidden"
);

}

function closeDeleteAddressModal(){

document
.getElementById(
"deleteAddressModal"
)
.classList.add(
"hidden"
);

selectedAddressLabel = "";

}

function closeEditAddressModal(){

document
.getElementById(
"editAddressModal"
)
.classList.add(
"hidden"
);

editingAddressLabel = "";

}
function openEditAddressModal(label){

editingAddressLabel = label;

let email =
localStorage.getItem(
"userEmail"
);

fetch(
`${API_ROOT}/addresses/${email}`
)

.then(res=>res.json())

.then(addresses=>{

let address =
addresses.find(
a => a.label === label
);

if(!address) return;

document.getElementById(
"editFullName"
).value =
address.fullName;

document.getElementById(
"editPhone"
).value =
address.phone;

document.getElementById(
"editHouse"
).value =
address.house;

document.getElementById(
"editStreet"
).value =
address.street;

document.getElementById(
"editCity"
).value =
address.city;

document.getElementById(
"editPincode"
).value =
address.pincode;

document
.getElementById(
"editAddressModal"
)
.classList.remove(
"hidden"
);

});

}


function closeAddressModal(){

  document
  .getElementById(
    "addAddressModal"
  )
  .classList
  .add(
    "hidden"
  );

  document
  .getElementById(
    "addAddressModal"
  )
  .classList
  .remove(
    "flex"
  );

}

document
.getElementById(
  "saveAddressBtn"
)
.addEventListener(
  "click",
  async ()=>{

    let label =
      document.getElementById(
        "newAddressLabel"
      ).value;

    let fullName =
      document.getElementById(
        "newFullName"
      ).value.trim();

    let phone =
      document.getElementById(
        "newPhone"
      ).value.trim();

    let house =
      document.getElementById(
        "newHouse"
      ).value.trim();

    let street =
      document.getElementById(
        "newStreet"
      ).value.trim();

    let city =
      document.getElementById(
        "newCity"
      ).value.trim();

    let pincode =
      document.getElementById(
        "newPincode"
      ).value.trim();

    if(
      !fullName ||
      !phone ||
      !house ||
      !street ||
      !city ||
      !pincode
    ){

      showToast("Please fill all fields", "error");

      return;

    }

    try{

      let res =
        await fetch(
          `${API_ROOT}/add-address`,
          {
            method:"POST",

            headers:{
              "Content-Type":
              "application/json"
            },

            body:JSON.stringify({

              email:
              localStorage.getItem(
                "userEmail"
              ),

              address:{

                label,
                fullName,
                phone,
                house,
                street,
                city,
                pincode,
                isDefault:false

              }

            })

          }
        );

      let data =
        await res.json();

      showToast(
        data.message
      );

      closeAddressModal();

      loadAddresses();

    }

    catch(err){

      console.log(err);

    }

  }
);


loadAddresses();

document.addEventListener(
"click",
async e=>{

if(
e.target.classList.contains(
"make-default-btn"
)
){

let label =
e.target.dataset.label;

try{

let res =
await fetch(
`${API_ROOT}/set-default-address`,
{

method:"PUT",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

email:
localStorage.getItem(
"userEmail"
),

label

})

}

);

let data =
await res.json();

showToast(
data.message
);

loadAddresses();

}

catch(err){

console.log(err);

}

}

});

document
.getElementById(
"confirmDeleteAddressBtn"
)
.addEventListener(
"click",
async ()=>{

try{

let res =
await fetch(
`${API_ROOT}/delete-address`,
{

method:"DELETE",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

email:
localStorage.getItem(
"userEmail"
),

label:
selectedAddressLabel

})

}

);

let data =
await res.json();

showToast(
data.message
);

closeDeleteAddressModal();

loadAddresses();

}

catch(err){

console.log(err);

}

});

document
.getElementById(
"saveEditedAddressBtn"
)
.addEventListener(
"click",
async ()=>{

try{

let res =
await fetch(
`${API_ROOT}/edit-address`,
{

method:"PUT",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

email:
localStorage.getItem(
"userEmail"
),

label:
editingAddressLabel,

fullName:
document.getElementById(
"editFullName"
).value,

phone:
document.getElementById(
"editPhone"
).value,

house:
document.getElementById(
"editHouse"
).value,

street:
document.getElementById(
"editStreet"
).value,

city:
document.getElementById(
"editCity"
).value,

pincode:
document.getElementById(
"editPincode"
).value

})

}

);

let data =
await res.json();

showToast(
data.message
);

closeEditAddressModal();

loadAddresses();

}

catch(err){

console.log(err);

}

});
function showToast(

  message,

  type = "success"

) {

  const toast =

    document.getElementById(
      "toast"
    );

  toast.innerText =
    message;

  toast.className =

    `fixed top-5 right-5 z-50 rounded-2xl px-6 py-4 text-white font-bold shadow-2xl

    ${

      type === "success"

      ?

      "bg-green-500"

      :

      "bg-red-500"

    }`;

  toast.classList.remove(
    "hidden"
  );

  setTimeout(() => {

    toast.classList.add(
      "hidden"
    );

  }, 2500);

}

</script>
<div

id="toast"

class="fixed top-5 right-5 z-50 hidden rounded-2xl bg-green-500 px-6 py-4 text-white font-bold shadow-2xl">

</div>
<audio
id="globalMusic"
loop>

<source
src="default-music.mp3"
type="audio/mpeg">

</audio>

<script src="music.js"></script>
</body>
</html>
