  <script>

    function protectPage() {
      let loggedIn = localStorage.getItem("isLoggedIn");
      if (!loggedIn) {
        window.location.href = "login.html";
      }
    }

    function formatName(name) {
      if (!name) return "Guest";
      return name
        .split(" ")
        .filter(Boolean)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    function updateAccountUI() {
      let email = localStorage.getItem("userEmail") || "";
      let savedName = localStorage.getItem("userName") || "";
      let displayName = savedName || email.split("@")[0].replace(/[^a-zA-Z0-9]/g, " ");
      displayName = formatName(displayName);

      let accountName = document.getElementById("accountName");
      let accountEmail = document.getElementById("accountEmail");

      if (accountName) accountName.innerText = displayName;
      if (accountEmail) accountEmail.innerText = email;
    }

    function toggleAccountMenu() {
      let menu = document.getElementById("accountMenu");
      if (!menu) return;
      menu.classList.toggle("hidden");
    }

    function hideAccountMenuOnClickOutside(event) {
      let menu = document.getElementById("accountMenu");
      let button = event.target.closest("button[onclick='toggleAccountMenu()']");
      if (!menu || button) return;
      if (!menu.contains(event.target)) {
        menu.classList.add("hidden");
      }
    }

    async function loadMyFeedbacks() {

  let email =
    localStorage.getItem(
      "userEmail"
    );

  if (!email) return;

  try {

    let res =
      await fetch(
        `${API_ROOT}/feedbacks/user/${encodeURIComponent(email)}`
      );

    let feedbacks =
      await res.json();

    let container =
      document.getElementById(
        "myFeedbackContainer"
      );

    if (!feedbacks.length) {

      container.innerHTML = `
        <p class="text-slate-300">
          No feedbacks yet.
        </p>
      `;

      return;
    }

    container.innerHTML =
      feedbacks.map(fb => `

      <div class="glass-card rounded-3xl p-6">

        <p class="font-bold text-orange-300">
          ${fb.itemName || "General Feedback"}
        </p>

        ${
          fb.image
          ? `<img
              src="${fb.image}"
              class="w-full h-48 object-cover rounded-2xl mt-3">`
          : ""
        }

        <p class="mt-3">
          ${fb.text}
        </p>

        <p class="text-yellow-300 mt-2">
          ⭐ ${fb.rating}/5
        </p>
<button
      onclick="deleteMyFeedback('${fb._id}')"
      class="mt-4 rounded-xl bg-red-500 px-4 py-2 text-white hover:bg-red-600">
      🗑 Delete
    </button>
<button
  onclick="editMyFeedback('${fb._id}', '${(fb.text || "").replace(/'/g, "\\'")}', ${fb.rating})"
  class="mt-2 ml-2 rounded-xl bg-blue-500 px-4 py-2 text-white hover:bg-blue-600">
  ✏️ Edit
</button>

        
      </div>

      `).join("");

  } catch (err) {

    console.log(err);

  }

}


async function deleteMyFeedback(id) {

  if (!confirm("Delete this feedback?")) {
    return;
  }

  try {

    let res = await fetch(
      `${API_ROOT}/feedback/${id}`,
      {
        method: "DELETE"
      }
    );

    let data = await res.json();

    showToast(data.message);

    loadMyFeedbacks();
    loadFeedback();

  } catch (err) {

    console.log(err);

    showToast("Delete failed ❌");

  }

}


async function editMyFeedback(
  id,
  currentText,
  currentRating
) {

  let newText =
    prompt(
      "Edit feedback:",
      currentText
    );

  if (
    newText === null
  ) return;

  let newRating =
    prompt(
      "Rating (1-5):",
      currentRating
    );

  if (
    newRating === null
  ) return;

  try {

    let res =
      await fetch(
        `${API_ROOT}/feedback/${id}`,
        {
          method: "PUT",
          headers: {
            "Content-Type":
              "application/json"
          },
          body: JSON.stringify({
            text: newText,
            rating: Number(
              newRating
            )
          })
        }
      );

    let data =
      await res.json();

    showToast(
      data.message
    );

    loadMyFeedbacks();
    loadFeedback();

  } catch (err) {

    console.log(err);

    showToast(
      "Update failed ❌"
    );

  }

}

  document
    .getElementById(
      "adminFeedbackPanel"
    )
    .classList.remove("hidden");

}

    function logout() {
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("userEmail");
      localStorage.removeItem("userName");
      window.location.href = "login.html";
    }

    function showToast(message) {
      let toast = document.createElement("div");
      toast.innerText = message;
      toast.className = "fixed bottom-40 left-1/2 z-50 max-w-xs -translate-x-1/2 rounded-full bg-orange-500 px-5 py-3 text-center text-white shadow-2xl opacity-0 transition-opacity duration-200";
      document.body.appendChild(toast);
      requestAnimationFrame(() => { toast.style.opacity = "1"; });
      setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 300);
      }, 2200);
    }

    function convertToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadFeedback() {
      let email = localStorage.getItem("userEmail");
      if (!email) {
        showToast("Login first! 😅");
        return;
      }

      let fileInput = document.getElementById("feedbackImage");
      let textInput = document.getElementById("feedbackText");
   let itemName =
document.getElementById(
  "feedbackItemSearch"
).value.trim();
      let text = textInput.value.trim();
      let orderId = document.getElementById("feedbackOrderId").value.trim();
     

      


      if (!fileInput.files.length && !text) {
        showToast("Add photo or text! 📝");
        return;
      }

      if (feedbackRating === 0) {
        showToast("Please rate the item! ⭐");
        return;
      }

      try {
        let image = "";
        if (fileInput.files.length) {
          image = await convertToBase64(fileInput.files[0]);
        }

        let userData = JSON.parse(localStorage.getItem("userData") || "{}");
        let name = userData.name || localStorage.getItem("userName") || email.split("@")[0];

        let res = await fetch(`${API_ROOT}/feedback`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, name, image, text, rating: feedbackRating, itemName, orderId })
        });

        if (res.ok) {
          showToast("✅ Feedback shared!");

          // Clear form
          fileInput.value = "";
          textInput.value = "";
          document.getElementById("feedbackOrderId").value = "";
          document.getElementById("feedbackItemSearch").value = "";
          feedbackRating = 0;
          document.getElementById("imagePreview").classList.add("hidden");
          document.getElementById("ratingDisplay").innerText = "No rating selected";
          document.getElementById("ratingDisplay").classList.add("text-slate-400");
          document.getElementById("ratingDisplay").classList.remove("text-yellow-300");

          // Reset rating buttons
          for (let i = 1; i <= 5; i++) {
            let btn = document.getElementById(`rating-${i}`);
            if (btn) {
              btn.classList.add("bg-white/10");
              btn.classList.remove("bg-yellow-500/40", "border-yellow-400");
            }
          }

          // Reload feedback after 500ms
          setTimeout(() => {
            loadMyFeedbacks();
            loadFeedback();
          }, 500);
        } else {
          showToast("Upload failed ❌");
        }
      } catch (err) {
        console.log(err);
        showToast("Upload failed ❌");
      }
    }

    async function loadFeedback() {
      let container = document.getElementById("feedbackContainer");
      try {
        let res = await fetch(`${API_ROOT}/feedbacks`);
        let feedbacks = await res.json();

        if (!feedbacks || feedbacks.length === 0) {
          container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-300"><p class="text-xl">No feedback yet 😅</p><p>Be the first to share your experience!</p></div>`;
          return;
        }

        container.innerHTML = feedbacks.map(fb => `
          <div class="glass-card rounded-3xl p-6 border border-white/10 hover:border-orange-400/50 transition space-y-4">
            <div class="flex items-start justify-between">
              <div>
                <p class="font-bold text-orange-300">${fb.name || "Anonymous"}</p>
                ${fb.itemName ? `<p class="text-xs text-slate-300">About: <span class="text-orange-200">${fb.itemName}</span></p>` : ""}
                <p class="text-xs text-slate-400">${new Date(fb.createdAt).toLocaleDateString()}</p>
              </div>
              <button onclick="likeFeedback('${fb._id}')" class="text-2xl hover:scale-125 transition" id="like-${fb._id}">
                ${fb.likedBy && fb.likedBy.includes(localStorage.getItem("userEmail")) ? "❤️" : "🤍"}
              </button>
            </div>

            ${fb.image ? `<img src="${fb.image}" alt="Feedback" class="w-full rounded-2xl object-cover h-48" onerror="this.src='https://via.placeholder.com/300'">` : ""}

            <p class="text-sm text-slate-200">${fb.text}</p>

            ${fb.rating ? `<p class="text-sm text-yellow-300 font-semibold">⭐ Rating: ${fb.rating}/5</p>` : ""}

            <p class="text-xs text-orange-300 font-semibold">${fb.likes || 0} people loved this ❤️</p>
          </div>
        `).join("");
      } catch (err) {
        console.log(err);
        container.innerHTML = `<div class="col-span-full text-center py-10 text-red-400">Failed to load feedback ❌</div>`;
      }
    }

    let feedbackRating = 0;

    function setFeedbackRating(score) {
      feedbackRating = score;
      
      // Update button highlighting
      for (let i = 1; i <= 5; i++) {
        let btn = document.getElementById(`rating-${i}`);
        if (i <= score) {
          btn.classList.remove("bg-white/10");
          btn.classList.add("bg-yellow-500/40", "border-yellow-400");
        } else {
          btn.classList.add("bg-white/10");
          btn.classList.remove("bg-yellow-500/40", "border-yellow-400");
        }
      }
      
      // Update display text
      let displayEl = document.getElementById("ratingDisplay");
      if (displayEl) {
        displayEl.innerText = `Rating: ${score}/5 stars`;
        displayEl.classList.remove("text-slate-400");
        displayEl.classList.add("text-yellow-300");
      }
    }



    document.getElementById("feedbackImage").addEventListener("change", (e) => {
      if (e.target.files.length) {
        let reader = new FileReader();
        reader.onload = (event) => {
          let preview = document.getElementById("imagePreview");
          preview.src = event.target.result;
          preview.classList.remove("hidden");
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    });

    let allItems = [];
    let selectedItemId = null;

    async function loadItemsForFeedback() {
      try {
        let res = await fetch(`${API_ROOT}/items`);
        allItems = await res.json();
        setupItemSearch();
      } catch (err) {
        console.log("Failed to load items", err);
      }
    }

    function setupItemSearch() {
      let searchInput = document.getElementById("feedbackItemSearch");
      let dropdown = document.getElementById("feedbackItemDropdown");

      searchInput.addEventListener("focus", () => {
        renderItemDropdown("");
        dropdown.classList.remove("hidden");
      });

      searchInput.addEventListener("input", (e) => {
        let query = e.target.value.toLowerCase();
        renderItemDropdown(query);
        if (query) dropdown.classList.remove("hidden");
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest("#feedbackItemSearch") && !e.target.closest("#feedbackItemDropdown")) {
          dropdown.classList.add("hidden");
        }
      });
    }

    function renderItemDropdown(query) {
      let dropdown = document.getElementById("feedbackItemDropdown");
      let filtered = query ? allItems.filter(item =>
        item.name.toLowerCase().includes(query) ||
        item.categories.some(cat => cat.toLowerCase().includes(query))
      ) : allItems;

      dropdown.innerHTML = filtered.slice(0, 8).map(item => `
        <div onclick="selectFeedbackItem('${item._id}', '${item.name.replace(/'/g, "\\'")}', '${item.price}', '${item.image.replace(/'/g, "\\'")}')" class="px-4 py-3 cursor-pointer hover:bg-white/10 transition border-b border-white/5 flex items-center gap-3">
          <img src="${item.image}" alt="${item.name}" class="w-10 h-10 rounded object-cover">
          <div class="flex-1">
            <p class="font-semibold text-white">${item.name}</p>
            <p class="text-xs text-slate-400">₹${item.price}</p>
          </div>
        </div>
      `).join("");

      if (filtered.length === 0) {
        dropdown.innerHTML = '<div class="px-4 py-3 text-slate-400 text-sm">No items found</div>';
      }
    }

    function selectFeedbackItem(itemId, itemName, itemPrice, itemImage) {
      selectedItemId = itemId;
      document.getElementById("feedbackItemSearch").value = itemName;
      document.getElementById("selectedItemName").innerText = itemName;
      document.getElementById("selectedItemPrice").innerText = `₹${itemPrice}`;
      document.getElementById("selectedItemImage").src = itemImage;
      document.getElementById("selectedItemDisplay").classList.remove("hidden");
      document.getElementById("feedbackItemDropdown").classList.add("hidden");
      feedbackRating = 0;
      updateRatingDisplay();
    }

    function clearSelectedItem() {
      selectedItemId = null;
      document.getElementById("feedbackItemSearch").value = "";
      document.getElementById("selectedItemDisplay").classList.add("hidden");
      feedbackRating = 0;
      updateRatingDisplay();
    }

    function updateRatingDisplay() {
      let displayEl = document.getElementById("ratingDisplay");
      if (feedbackRating === 0) {
        displayEl.innerText = "No rating selected";
        displayEl.classList.add("text-slate-400");
        displayEl.classList.remove("text-yellow-300");
      } else {
        displayEl.innerText = `Rating: ${feedbackRating}/5 stars`;
        displayEl.classList.remove("text-slate-400");
        displayEl.classList.add("text-yellow-300");
      }

      for (let i = 1; i <= 5; i++) {
        let btn = document.getElementById(`rating-${i}`);
        if (i <= feedbackRating) {
          btn.classList.add("bg-yellow-500/40", "border-yellow-400");
          btn.classList.remove("bg-white/10");
        } else {
          btn.classList.remove("bg-yellow-500/40", "border-yellow-400");
          btn.classList.add("bg-white/10");
        }
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      const feedbackParams = new URLSearchParams(window.location.search);
      const linkedOrderId = feedbackParams.get("id");
      if (linkedOrderId) {
        document.getElementById("feedbackOrderId").value = linkedOrderId;
      }
      loadAdminPanel();
      protectPage();
      updateAccountUI();
      loadMyFeedbacks();
      loadFeedback();
      loadItemsForFeedback();
      document.addEventListener("click", hideAccountMenuOnClickOutside);
    });
  </script>
<audio
id="globalMusic"
loop>

<source
src="default-music.mp3"
type="audio/mpeg">

</audio>

<script src="music.js"></script>
</body>
